name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S Caches -B Caches/build

      - name: Build
        run: cmake --build Caches/build --config Release --parallel

      - name: Test
        run: ctest --test-dir Caches/build -C Release --output-on-failure
